apiVersion: apps/v1
kind: Deployment
metadata:
  name: wanderlust-deployment
  labels:
    app: wanderlust
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wanderlust
  template:
    metadata:
      labels:
        app: wanderlust
    spec:
      containers:
      - name: wanderlust-app
        image: shivaamaroju/wanderlust:latest
        ports:
        - containerPort: 8082
        env:
        - name: MONGO_URL
          valueFrom:
            secretKeyRef:
              name: mongo-secrets
              key: MONGO_URI
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: wanderlust-service
spec:
  type: LoadBalancer  # Gives you the External IP
  selector:
    app: wanderlust
  ports:
    - protocol: TCP
      port: 80         # Access app at http://<External-IP>
      targetPort: 8090
