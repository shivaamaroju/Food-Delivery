# Backend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: shivaamaroju/food-backend:latest
        imagePullPolicy: Always
        env:
        - name: MONGO_URL
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: MONGO_URL
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: JWT_SECRET
        - name: SALT
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: SALT
        - name: STRIPE_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: STRIPE_SECRET_KEY
        ports:
        - containerPort: 5000
